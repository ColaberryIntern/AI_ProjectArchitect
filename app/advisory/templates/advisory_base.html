<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Workforce Designer | Colaberry{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/advisory/static/css/advisory.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="advisory-body">
    <nav class="navbar navbar-expand-lg navbar-dark advisory-nav">
        <div class="container">
            <div class="navbar-brand d-flex align-items-center gap-2 mb-0">
                <a href="https://enterprise.colaberry.ai" class="d-flex align-items-center text-decoration-none">
                    <img src="https://www.colaberry.com/wp-content/uploads/2022/06/colaberry-black-logo.png"
                         alt="Colaberry" height="28" style="filter: brightness(0) invert(1);">
                </a>
                <span class="opacity-50 mx-1">|</span>
                <a href="/advisory/" class="text-white text-decoration-none fw-bold">AI Workforce Designer</a>
            </div>
            <div class="navbar-nav ms-auto">
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="advisory-footer text-center py-4 mt-5">
        <div class="container">
            <img src="https://www.colaberry.com/wp-content/uploads/2022/06/colaberry-black-logo.png"
                 alt="Colaberry" height="20" class="mb-2 opacity-50">
            <p class="text-muted mb-0 small">Colaberry AI Workforce Designer | Enterprise AI Systems for Business Transformation</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/advisory/static/js/advisory.js"></script>
    <script src="/advisory/static/js/tracker.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
