{# All My Day-specific CSS. Included at the top of every my_day content block
   so the styles are present whether the page extends _library_base or its
   own old standalone base. #}
<style>
  /* Buttons */
  .md-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    text-decoration: none; cursor: pointer; border: 1px solid transparent;
    line-height: 1; transition: background 0.1s;
  }
  .md-btn-primary { background: #1f1f1f; color: white; }
  .md-btn-primary:hover { background: #000; color: white; }
  .md-btn-primary.copied { background: #0969da; }
  /* ── Standardized action pair (consistent across EVERY My Day surface) ──
     Prompt is ALWAYS black; Workspace is ALWAYS indigo. Briefing, Kanban,
     Heat map, Library suggestions, tables — same two colors everywhere so
     the user learns "black = copy prompt, indigo = open workspace" once. */
  .md-btn-prompt { background: #1f1f1f; color: #fff; border-color: #1f1f1f; }
  .md-btn-prompt:hover { background: #000; color: #fff; }
  .md-btn-prompt.copied { background: #0969da; color: #fff; border-color: #0969da; }
  .md-btn-workspace { background: #6639ba; color: #fff; border-color: #6639ba; }
  .md-btn-workspace:hover { background: #512da8; color: #fff; }
  .md-btn-success { background: #1a7f37; color: white; }
  .md-btn-success:hover { background: #15803d; color: white; }
  .md-btn-outline { background: #fff; color: #1f2328; border-color: #d0d7de; }
  .md-btn-outline:hover { background: #f6f8fa; }
  .md-btn-quiet { background: transparent; color: #57606a; }
  .md-btn-quiet:hover { background: #f0f0f0; color: #1f2328; }

  /* Grand-score banner */
  .grand-score-banner {
    display: flex; align-items: center; gap: 24px;
    border-radius: 10px; padding: 16px 24px; margin-bottom: 16px;
    border: 1px solid;
  }
  .grand-score-banner.on_track  { background: #dafbe1; border-color: #aceebb; color: #114529; }
  .grand-score-banner.ai_risk   { background: #fff4d5; border-color: #f0d678; color: #4a3500; }
  .grand-score-banner.at_risk   { background: #ffeef0; border-color: #ffabba; color: #82071e; }
  .grand-score-banner.no_data   { background: #f6f8fa; border-color: #d0d7de; color: #57606a; }
  .grand-score-banner .gs-eyebrow { font-size: 11px; letter-spacing: 1.2px; font-weight: 700; opacity: 0.7; margin-right: 8px; }
  .grand-score-banner .gs-score { display: flex; align-items: baseline; gap: 10px; }
  .grand-score-banner .gs-number { font-size: 36px; font-weight: 800; line-height: 1; }
  .grand-score-banner .gs-label { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
  .grand-score-banner .gs-detail { margin-left: auto; font-size: 12px; opacity: 0.85; }

  /* Status strip */
  .status-strip {
    border-radius: 10px; padding: 18px 24px; margin-bottom: 20px;
    border: 1px solid; display: flex; align-items: baseline; gap: 16px;
    flex-wrap: wrap;
  }
  .status-strip.on_track       { background: #dafbe1; border-color: #aceebb; }
  .status-strip.needs_attention{ background: #fff4d5; border-color: #f0d678; }
  .status-strip.jeopardy       { background: #ffeef0; border-color: #ffabba; }
  .status-strip .headline { font-size: 18px; font-weight: 700; }
  .status-strip .subhead  { font-size: 14px; color: #4a4a4a; }
  .status-strip .greeting { font-size: 13px; color: #57606a; margin-right: 8px; }

  /* View tabs */
  .view-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .view-tab {
    padding: 8px 16px; border-radius: 8px 8px 0 0;
    text-decoration: none; color: #57606a; font-size: 13px; font-weight: 500;
    border: 1px solid transparent; border-bottom: 0; background: transparent;
  }
  .view-tab:hover { background: #eaeef2; color: #1f2328; }
  .view-tab.active {
    background: #fff; color: #1f2328; font-weight: 600;
    border-color: #d0d7de; position: relative; top: 1px;
  }

  /* Project + tier chips */
  .project-chips {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 16px;
    border-bottom: 1px solid #d0d7de; margin-bottom: 20px;
    border-top: 1px solid #d0d7de; padding-top: 16px;
  }
  .proj-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: #fff; border: 1px solid #d0d7de;
    font-size: 12px; color: #1f2328; text-decoration: none;
  }
  .proj-chip:hover { background: #f6f8fa; color: #1f2328; }
  .proj-chip.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .proj-chip .chip-count {
    background: rgba(0,0,0,0.06); padding: 1px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .proj-chip.active .chip-count { background: rgba(255,255,255,0.2); color: #fff; }
  .proj-chip .chip-overdue {
    background: #cf222e; color: white; padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
  }
  .proj-chip.has-overdue:not(.active) { border-color: #ffabba; }

  /* Kanban */
  .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kanban-col { background: #f6f8fa; border-radius: 8px; padding: 12px; min-height: 200px; }
  .kanban-col h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
    margin: 0 0 12px; padding: 0 4px; color: #57606a;
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban-col h3 .count {
    background: rgba(0,0,0,0.08); padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; color: #1f2328;
  }
  .kanban-col.col-now h3 { color: #cf222e; }
  .kanban-col.col-now h3 .count { background: #cf222e; color: white; }
  .kanban-col.col-soon h3 { color: #8a5a00; }
  .kanban-col.col-soon h3 .count { background: #f0d678; color: #1f2328; }
  .kanban-col.col-later h3 { color: #0550ae; }
  .kanban-col.col-waiting h3 { color: #6e5a00; }

  .kanban-card {
    background: #fff; border: 1px solid #d0d7de; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
    display: block; text-decoration: none; color: #1f2328;
  }
  .kanban-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); color: #1f2328; }
  .kanban-card.is-overdue { border-left: 3px solid #cf222e; }
  .kanban-card.is-red { border-left: 3px solid #cf222e; }
  .kanban-card.is-amber { border-left: 3px solid #f0d678; }
  .kanban-card .title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .kanban-card .meta { font-size: 11px; color: #57606a; }
  .kanban-card .meta .pill { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 10px; font-weight: 700; }
  .kanban-card .meta .pill.red   { background: #ffeef0; color: #cf222e; }
  .kanban-card .meta .pill.amber { background: #fff4d5; color: #8a5a00; }
  .kanban-card .meta .pill.gray  { background: #eaeef2; color: #57606a; }

  /* Email-style task sequence table inside Lists in detail */
  .task-seq-header {
    background: #1a1a1a; color: #fff; padding: 10px 16px;
    font-size: 11px; letter-spacing: 0.8px; font-weight: 700;
    border-radius: 0;
  }
  .task-seq { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
  .task-seq thead { background: #f6f8fa; color: #4a4a4a; }
  .task-seq th {
    padding: 8px 12px; text-align: left; font-size: 10px;
    letter-spacing: 0.6px; text-transform: uppercase; font-weight: 700;
    border-bottom: 1px solid #d0d7de;
  }
  .task-seq-row td {
    padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle;
  }
  .task-seq-row:hover td { background: #fafbfc; }
  .task-seq-row.is-overdue td { background: #fff5f6; }
  .task-seq-row.is-next-human td { background: #fff8d6; border-left: 3px solid #d4a72c; }
  .task-seq-row.is-next-human td:first-child { border-left: 0; }
  .task-seq-row .seq-num { color: #57606a; font-weight: 600; text-align: center; }
  .task-seq-row .seq-task a { color: #0969da; text-decoration: none; font-weight: 600; }
  .task-seq-row .seq-task-sub {
    color: #57606a; font-size: 10px; letter-spacing: 0.4px;
    text-transform: uppercase; font-weight: 600; margin-top: 2px;
  }
  .task-seq-row .seq-task-sub .next-human-arrow {
    color: #8a5a00; font-weight: 800; margin-left: 6px;
  }
  .task-seq-row .seq-owner { font-size: 12px; color: #1f2328; }
  .task-seq-row .seq-owner .dim { color: #8a8a8a; }

  /* Due pills inside task-seq (multi-line: label + date stacked) */
  .task-seq .due-pill {
    display: inline-block; padding: 5px 10px; border-radius: 4px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.6px; line-height: 1.2;
    text-align: center; min-width: 90px;
  }
  .task-seq .due-pill small { font-size: 9px; font-weight: 600; letter-spacing: 0.3px; opacity: 0.95; }
  .task-seq .due-pill.overdue { background: #cf222e; color: white; }
  .task-seq .due-pill.today   { background: #d4a72c; color: white; }
  .task-seq .due-pill.normal  { background: #ddf4ff; color: #0550ae; }

  /* PROJECT TIMELINE: past (completed) rows + past/future divider + inline expanders */
  .task-seq-row.is-completed { background: #fafbfc; opacity: 0.78; }
  .task-seq-row.is-completed:hover { opacity: 1; background: #f0f3f6; }
  .task-seq-row.is-completed .seq-task a { color: #57606a; text-decoration: line-through; }
  .task-seq-row.is-completed .seq-num { color: #1a7f37; font-weight: 700; }

  .task-seq .due-pill.done {
    background: #dafbe1; color: #15803d; border: 1px solid #aceebb;
    padding: 2px 8px; font-size: 11px;
  }

  tr.seq-divider td {
    background: linear-gradient(180deg, #fafbfc 0%, #fff 50%, #fafbfc 100%);
    text-align: center; font-size: 10px; font-weight: 700;
    letter-spacing: 1.2px; color: #8b949e;
    padding: 8px 12px !important;
    border-top: 1px solid #d0d7de !important;
    border-bottom: 1px solid #d0d7de !important;
  }

  .task-seq-row.is-expander td { padding: 6px 12px !important; }

  /* Full-screen dim loader shown while a filter change reloads the page */
  #md-page-loader {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(15, 20, 25, 0.55);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    animation: md-loader-fadein 0.12s ease-out;
  }
  #md-page-loader[hidden] { display: none; }
  .md-loader-content {
    background: #fff; padding: 26px 38px;
    border-radius: 12px; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.22);
    min-width: 240px;
  }
  .md-spinner {
    width: 38px; height: 38px;
    border: 3px solid #e1e4e8; border-top-color: #1f1f1f;
    border-radius: 50%; margin: 0 auto 14px;
    animation: md-spin 0.8s linear infinite;
  }
  .md-loader-text { font-size: 14px; font-weight: 600; color: #1f2328; letter-spacing: 0.3px; }
  .md-loader-sub  { font-size: 12px; color: #57606a; margin-top: 4px; }
  @keyframes md-spin { to { transform: rotate(360deg); } }
  @keyframes md-loader-fadein { from { opacity: 0; } to { opacity: 1; } }

  /* Past-count chips (0/5/10/All) inside the PROJECT TIMELINE table */
  .past-chip {
    display: inline-block; padding: 4px 12px; margin: 0 3px;
    border-radius: 999px; background: #fff;
    border: 1px solid #d0d7de; color: #1f2328;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .past-chip:hover:not(:disabled) { background: #f6f8fa; }
  .past-chip.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .past-chip:disabled { opacity: 0.4; cursor: not-allowed; }

  /* NEXT HUMAN STEP banner — email-style dark callout inside drill-down */
  .next-human-banner {
    background: #1a1a1a; color: #f0e9d4;
    border-radius: 10px; padding: 18px 22px; margin-bottom: 14px;
  }
  .next-human-banner .eyebrow {
    font-size: 11px; color: #f0d678; letter-spacing: 1.2px;
    font-weight: 700; margin-bottom: 8px;
  }
  .next-human-banner h3 { color: white; font-size: 17px; margin: 0 0 10px; font-weight: 700; }
  .next-human-banner .meta { font-size: 13px; color: #d6cfb6; margin-bottom: 12px; }
  .next-human-banner .meta strong { color: white; }
  .next-human-banner .banner-due {
    display: inline-block; padding: 3px 9px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
  }
  .next-human-banner .banner-due.overdue { background: #cf222e; color: white; }
  .next-human-banner .banner-due.today { background: #d4a72c; color: white; }
  .next-human-banner .banner-due.normal { background: rgba(255,255,255,0.18); color: white; }
  .next-human-banner .open-ticket-btn {
    display: inline-block; background: #d4a72c; color: #1a1a1a;
    padding: 9px 18px; border-radius: 6px; text-decoration: none;
    font-weight: 700; font-size: 13px;
  }
  .next-human-banner .open-ticket-btn:hover { background: #f0d678; color: #1a1a1a; }

  /* BLOCKED on upstream marker — small red arrow text on a sequence row */
  .task-seq-row .blocked-arrow {
    background: #ffeef0; color: #cf222e; font-weight: 800;
    padding: 1px 7px; border-radius: 3px; font-size: 9px;
    letter-spacing: 0.4px; margin-left: 6px;
  }

  /* Tier pill (AI vs HUMAN, like the email) */
  .tier-pill {
    display: inline-block; padding: 4px 12px; border-radius: 999px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
  }
  .tier-pill.ai    { background: #ddf4ff; color: #0550ae; }
  .tier-pill.human { background: #fff4d5; color: #8a5a00; }

  /* KPI tiles (3-up) */
  .kpi-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    border-radius: 10px; padding: 22px 26px; text-align: center;
    border: 1px solid;
  }
  .kpi .value { font-size: 38px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
  .kpi .label { font-size: 11px; letter-spacing: 1.2px; margin-top: 8px;
                color: #4a4a4a; font-weight: 700; }
  .kpi.human   { background: #fff8d6; border-color: #f0d678; }
  .kpi.human .value   { color: #8a5a00; }
  .kpi.ai      { background: #ddf4ff; border-color: #c6e2ff; }
  .kpi.ai .value      { color: #0550ae; }
  .kpi.overdue { background: #ffeef0; border-color: #ffabba; }
  .kpi.overdue .value { color: #cf222e; }

  /* Heatmap */
  .heatmap-section { margin-bottom: 28px; }
  .heatmap-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  /* Heat card is now a <div> (not one big <a>) so it can hold its own
     title link, a BC deep-link, a clickable Next box, and the standard
     Prompt + Workspace button pair. */
  .heat-card { border-radius: 8px; padding: 14px 16px; border: 1px solid; display: block; }
  .heat-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.14); }
  .heat-card .name { font-weight: 700; font-size: 14px; margin-bottom: 2px; line-height: 1.25; }
  .heat-card .name a { color: inherit; text-decoration: none; }
  .heat-card .name a:hover { text-decoration: underline; }
  .heat-card .bc-link { font-size: 10px; font-weight: 600; opacity: 0.85; color: inherit; text-decoration: none; }
  .heat-card .bc-link:hover { text-decoration: underline; opacity: 1; }
  .heat-card .score-line { font-size: 12px; opacity: 0.95; margin: 6px 0; font-weight: 600; }
  /* KPI chip strip — Late% · AI% · open/overdue. Translucent so it reads on
     any band color. */
  .heat-card .kpi-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .heat-card .kpi-chip {
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    padding: 2px 7px; border-radius: 999px;
    background: rgba(255,255,255,0.30); font-family: ui-monospace, monospace;
  }
  .heat-card .mix-line { font-size: 11px; opacity: 0.9; font-family: ui-monospace, monospace; }
  .heat-card .next-box {
    display: block; margin: 8px 0; font-size: 11px; padding: 6px 8px;
    background: rgba(0,0,0,0.12); border-radius: 4px; color: inherit; text-decoration: none;
  }
  .heat-card .next-box:hover { background: rgba(0,0,0,0.20); }
  .heat-card .heat-actions { display: flex; gap: 6px; margin-top: 8px; }
  .heat-card .heat-actions .md-btn { padding: 5px 10px; font-size: 11px; }
  .heat-card .ka-prompt { display: none; }

  /* 5-band health scale: red -> orange -> gold -> lime -> green.
     Keys match rollup.score_band(): b1 (critical) ... b5 (on track). */
  .heat-card.heat-b1 { background: #cf222e; border-color: #b3261e; color: #fff; }
  .heat-card.heat-b2 { background: #e8590c; border-color: #c44708; color: #fff; }
  .heat-card.heat-b3 { background: #f0c000; border-color: #d4a72c; color: #4a3500; }
  .heat-card.heat-b4 { background: #74b816; border-color: #5c9210; color: #fff; }
  .heat-card.heat-b5 { background: #1a7f37; border-color: #15803d; color: #fff; }
  /* Legacy 4-class names kept as aliases in case any other surface still
     references them. */
  .heat-card.heat-jeopardy { background: #cf222e; border-color: #b3261e; color: white; }
  .heat-card.heat-at_risk { background: #e8590c; border-color: #c44708; color: #fff; }
  .heat-card.heat-ai_risk { background: #f0c000; border-color: #d4a72c; color: #4a3500; }
  .heat-card.heat-on_track { background: #1a7f37; border-color: #15803d; color: #fff; }

  /* Scatter plot panel */
  .scatter-panel { border: 1px solid #d0d7de; border-radius: 10px; padding: 16px 18px; margin-bottom: 28px; background: #fff; }
  .scatter-panel h2 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .scatter-panel .sub { font-size: 12px; color: #57606a; margin: 0 0 12px; }
  #md-scatter { width: 100%; height: 460px; }

  /* Section + tables */
  .section-head {
    font-size: 16px; font-weight: 600; color: #1f1f1f;
    margin: 24px 0 10px; padding-bottom: 6px;
    border-bottom: 2px solid #1a1a1a;
  }
  .md-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid #d0d7de; border-radius: 8px; overflow: hidden;
    font-size: 13px;
  }
  .md-table thead { background: #1a1a1a; color: white; }
  .md-table th { padding: 10px 14px; text-align: left; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; }
  .md-table td { padding: 10px 14px; border-top: 1px solid #eaeef2; }
  .md-table tr:hover td { background: #f6f8fa; }
  .md-table td.dim { color: #57606a; }

  /* Score pills */
  .score-pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .score-pill.on_track  { background: #dafbe1; color: #1a7f37; }
  .score-pill.ai_risk   { background: #fff4d5; color: #8a5a00; }
  .score-pill.at_risk   { background: #ffeef0; color: #cf222e; }

  /* Due pills */
  .due-pill { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .due-pill.overdue { background: #cf222e; color: white; }
  .due-pill.today   { background: #fff4d5; color: #8a5a00; }
  .due-pill.normal  { background: #eaeef2; color: #57606a; }

  /* H/AI mix */
  .mix { font-family: ui-monospace, monospace; font-size: 12px; }
  .mix .h { color: #cf222e; font-weight: 600; }
  .mix .a { color: #0550ae; font-weight: 600; }

  /* Blocking table colors */
  .blocking-table tr.row-overdue td { background: #ffeef0; }
  .blocking-table tr.row-overdue td:first-child { border-left: 3px solid #cf222e; }
  .blocking-table tr.row-today td { background: #fff4d5; }
  .blocking-table tr.row-today td:first-child { border-left: 3px solid #d4a72c; }
  .blocking-table tr.row-red td:first-child { border-left: 3px solid #cf222e; }
  .blocking-table tr.row-amber td:first-child { border-left: 3px solid #f0d678; }

  /* Steps + cards */
  .big-picture { background: #1a1a1a; color: #f0e9d4; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; }
  .big-picture .eyebrow { font-size: 11px; color: #f0e9d4; letter-spacing: 1.2px; font-weight: 700; margin-bottom: 10px; }
  .big-picture h2 { font-size: 18px; font-weight: 600; color: white; margin: 0 0 8px; }
  .big-picture p { margin: 0; font-size: 14px; line-height: 1.5; }
  .big-picture .why-line { color: #e8c46c; margin-top: 8px; }

<script>
// SINGLE SOURCE OF TRUTH for the "How to run this prompt" runbook across EVERY
// My Day copy surface: the briefing / kanban / heatmap / focus-card buttons via
// copyPrompt() below, AND the workspace page via rebuildFullPrompt() (which
// calls this same function). They MUST share one runbook — when they didn't,
// the cards kept shipping a stale clone-based runbook for days after the
// workspace page moved to the MCP model.
//
// The per-operator workspace repo is a behind-the-scenes sync artifact —
// operators never clone or touch it. Doctrine, the mandatory-ticket protocol,
// and the Basecamp + memory tools all reach the Claude Code session through the
// Colaberry MCP, so the only setup is "have the MCP connected" — no clone, no
// cd, no git pull. See directives/my-day-action-recipes.md Rule 2.
// Deliverable output types for the workspace editor dropdown. Keys MUST match
// the .out-<key> CSS above and suggestions.OUTPUT_TYPES on the server.
const MD_OUTPUT_TYPES = [
  ['code', 'Code'], ['doc', 'Doc'], ['pdf', 'PDF'], ['slides', 'Slides'],
  ['sheet', 'Sheet'], ['html', 'HTML'], ['image', 'Image'], ['diagram', 'Diagram'],
  ['notebook', 'Notebook'], ['video', 'Video'], ['audio', 'Audio'], ['data', 'Data'],
  ['dataset', 'Dataset'], ['config', 'Config'], ['archive', 'Archive'], ['folder', 'Folder'],
  ['email', 'Email'], ['text', 'Text'], ['other', 'Other']
];
// Visual types that must be grouped into a folder when there is more than one,
// and the Colaberry HTML dashboard standard URL (both mirror suggestions.py).
const MD_VISUAL_TYPES = ['image', 'html', 'diagram', 'slides'];
const HTML_FORMAT_URL = 'https://app.basecamp.com/3945211/buckets/7463955/todos/10039770075';

function _mdSetupBlock() {
  return (
    '## How to run this prompt\n\n' +
    '1. Open Claude Code on your computer. Any folder works -- you do NOT need\n' +
    '   to clone or set up any repo.\n' +
    '2. Make sure the Colaberry MCP is connected (one-time setup at\n' +
    '   advisor.colaberry.ai/profile/welcome). With it connected, Claude has\n' +
    '   your Basecamp tools, your project memory, and the Colaberry doctrine +\n' +
    '   ticket protocol -- all delivered through the MCP.\n' +
    '3. Paste the task prompt below.\n' +
    '\n' +
    'If the Basecamp / Colaberry tools are not available in your session, the\n' +
    'MCP is not connected -- reconnect at advisor.colaberry.ai/profile/welcome.\n'
  );
}

function _mcpGateOK() {
  // Block Copy Prompt when the user hasn't installed MCP -- without it the
  // copied prompt's setup steps are useless (no doctrine, no BC routing).
  // Yellow (token issued, not yet pinged) is allowed because the user is
  // mid-install and may legitimately want to grab the prompt while finishing.
  const status = document.body.dataset.mcpStatus || 'red';
  if (status === 'red') {
    if (confirm('Your laptop is not connected to the Colaberry MCP server yet.\n\nWithout MCP, the copied prompt has no doctrine, no auto-ticket creation, and no Basecamp routing.\n\nGo to /profile/mcp-setup to install? (Cancel to copy anyway.)')) {
      window.location.href = '/profile/mcp-setup';
      return false;
    }
  }
  return true;
}

function copyPrompt(promptId, btnEl) {
  if (!_mcpGateOK()) return;
  const el = document.getElementById(promptId);
  if (!el) return;
  const taskPrompt = el.value || '';
  // No '## Task' wrapper: the task prompt self-titles with a top-level
  // `# {title}` heading (see suggestions.py _PROMPT_TEMPLATE). Wrapping it
  // produced a confusing double heading on every card/list copy.
  const fullText = _mdSetupBlock() + '\n' + taskPrompt;
  navigator.clipboard.writeText(fullText).then(() => {
    const orig = btnEl.innerText;
    btnEl.innerText = '✓ Copied — paste into Claude Code';
    btnEl.classList.add('copied');
    setTimeout(() => { btnEl.innerText = orig; btnEl.classList.remove('copied'); }, 2400);
  });
}
</script>
