# Backing infrastructure: Redis + secrets + persistent volume claim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-redis
spec:
  replicas: 1
  selector:
    matchLabels: { app: ops-platform, component: redis }
  template:
    metadata:
      labels: { app: ops-platform, component: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ops-redis
spec:
  selector: { app: ops-platform, component: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Secret
metadata:
  name: ops-secrets
type: Opaque
stringData:
  # Rotate this on a real deployment.
  audit-hmac-key: "REPLACE_ME_WITH_A_LONG_RANDOM_STRING"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ops-output-pvc
spec:
  accessModes:
    # For multi-replica API/worker, switch to ReadWriteMany and a
    # storage class that supports it (e.g. EFS, Azure Files, Filestore).
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
